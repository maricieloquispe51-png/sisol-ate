<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisol Salud - Portal de Citas Médicas Ate</title>
    
    <!-- Librerías Críticas para Estilos y Generación de PDF -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sisolTeal: '#1da1a2',
                        sisolDarkBlue: '#093c5d',
                        sisolYellow: '#f1a834',
                        sisolYellowHover: '#d99120',
                        sisolOrange: '#ef3e36'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --url-fondo-login: url('https://unicla.edu.mx/wp-content/uploads/2025/04/Portada_Blog_2025_08_Abril.webp');
        }
        .bg-login-custom {
            background-image: var(--url-fondo-login);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-login-custom min-h-screen flex flex-col font-sans">

    <!-- CABECERA INSTITUCIONAL -->
    <header class="bg-white px-6 py-3 flex justify-between items-center shadow-md z-50">
        <div class="cursor-pointer">
            <img src="https://static.wikia.nocookie.net/logopedia/images/d/d5/Munilima23.png" alt="Municipalidad de Lima" class="h-12 md:h-14 object-contain">
        </div>
        <div class="cursor-pointer">
            <img src="https://convocatorias.sisol.gob.pe/wp-content/uploads/2022/03/Hospitales-de-la-solidaridad-.png" alt="Hospitales de la Solidaridad" class="h-12 md:h-14 object-contain">
        </div>
    </header>

    <main class="flex-1 flex justify-center items-center p-4 md:p-8">
        
        <!-- PANEL DE RESERVAS INTEGRAL -->
        <section class="w-full max-w-4xl bg-white rounded-3xl p-6 md:p-8 shadow-2xl border-4 border-sisolDarkBlue">
            <div class="flex justify-between items-center border-b-2 border-sisolTeal pb-3 mb-6">
                <h2 class="text-sisolYellow font-extrabold text-3xl">Reservar cita</h2>
                <button onclick="location.reload()" class="bg-sisolYellow hover:bg-sisolYellowHover text-black font-extrabold px-6 py-2 rounded-xl transition-all">Regresar</button>
            </div>

            <!-- SELECCIÓN DE ESPECIALIDAD -->
            <div class="mb-5">
                <label class="block text-black font-bold mb-1.5 text-lg">Seleccione la especialidad</label>
                <select id="res-specialty" onchange="onSpecialtyChange()" class="w-full px-4 py-3 border-2 border-sisolTeal rounded-xl font-bold bg-white focus:outline-none">
                    <option value="">-- Elija la especialidad médica --</option>
                    <option value="Cardiología" data-piso="Piso 2" data-consultorio="Cons. 204" data-costo="29">Cardiología - S/. 29.00</option>
                    <option value="Pediatría" data-piso="Piso 1" data-consultorio="Cons. 102" data-costo="29">Pediatría - S/. 29.00</option>
                    <option value="Oftalmología" data-piso="Piso 3" data-consultorio="Cons. 301" data-costo="29">Oftalmología - S/. 29.00</option>
                    <option value="Medicina General" data-piso="Piso 2" data-consultorio="Cons. 210" data-costo="21">Medicina General - S/. 21.00</option>
                    <option value="Odontología" data-piso="Piso 1" data-consultorio="Cons. 105" data-costo="15">Odontología - S/. 15.00</option>
                    <option value="Dermatología" data-piso="Piso 3" data-consultorio="Cons. 305" data-costo="25">Dermatología - S/. 25.00</option>
                    <option value="Ginecología" data-piso="Piso 2" data-consultorio="Cons. 208" data-costo="26">Ginecología y Obstetricia - S/. 26.00</option>
                    <option value="Gastroenterología" data-piso="Piso 1" data-consultorio="Cons. 112" data-costo="30">Gastroenterología - S/. 30.00</option>
                    <option value="Traumatología" data-piso="Piso 3" data-consultorio="Cons. 315" data-costo="32">Traumatología y Ortopedia - S/. 32.00</option>
                    <option value="Neurología" data-piso="Piso 2" data-consultorio="Cons. 222" data-costo="35">Neurología - S/. 35.00</option>
                    <option value="Otorrinolaringología" data-piso="Piso 1" data-consultorio="Cons. 108" data-costo="28">Otorrinolaringología - S/. 28.00</option>
                    <option value="Urología" data-piso="Piso 3" data-consultorio="Cons. 310" data-costo="30">Urología - S/. 30.00</option>
                    <option value="Endocrinología" data-piso="Piso 2" data-consultorio="Cons. 201" data-costo="32">Endocrinología - S/. 32.00</option>
                    <option value="Psiquiatría" data-piso="Piso 3" data-consultorio="Cons. 340" data-costo="25">Psiquiatría - S/. 25.00</option>
                    <option value="Nutrición" data-piso="Piso 1" data-consultorio="Cons. 106" data-costo="15">Nutrición y Dietética - S/. 15.00</option>
                    <option value="Reumatología" data-piso="Piso 2" data-consultorio="Cons. 214" data-costo="30">Reumatología - S/. 30.00</option>
                    <option value="Neumología" data-piso="Piso 1" data-consultorio="Cons. 119" data-costo="28">Neumología - S/. 28.00</option>
                    <option value="Nefrología" data-piso="Piso 3" data-consultorio="Cons. 311" data-costo="35">Nefrología - S/. 35.00</option>
                    <option value="Psicología" data-piso="Piso 1" data-consultorio="Cons. 120" data-costo="18">Psicología - S/. 18.00</option>
                    <option value="Geriatría" data-piso="Piso 2" data-consultorio="Cons. 205" data-costo="29">Geriatría - S/. 29.00</option>
                    <option value="Medicina Física" data-piso="Piso 1" data-consultorio="Cons. 130" data-costo="25">Medicina Física y Rehabilitación - S/. 25.00</option>
                    <option value="Oncología" data-piso="Piso 3" data-consultorio="Cons. 322" data-costo="40">Oncología Médica - S/. 40.00</option>
                    <option value="Cirugía General" data-piso="Piso 2" data-consultorio="Cons. 216" data-costo="30">Cirugía General - S/. 30.00</option>
                </select>
            </div>

            <!-- BLOQUE DE FECHA Y HORARIOS INTERACTIVOS -->
            <label class="block text-black font-bold mb-2 text-lg">Seleccione la fecha y hora</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
                
                <!-- Interfaz del Calendario Integrado de tu Maqueta -->
                <div class="border border-teal-200 rounded-2xl p-4 bg-white shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <button type="button" class="bg-blue-500 text-white px-2 py-0.5 rounded text-sm font-bold">◀</button>
                        <span class="font-extrabold text-sisolDarkBlue text-base">Junio De 2026</span>
                        <button type="button" class="bg-blue-500 text-white px-2 py-0.5 rounded text-sm font-bold">▶</button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-500 mb-2">
                        <div>LUN</div><div>MAR</div><div>MIE</div><div>JUE</div><div>VIE</div><div>SAB</div><div>DOM</div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 text-center text-sm font-bold text-gray-300">
                        <div class="py-1 bg-gray-50 rounded">1</div><div class="py-1 bg-gray-50 rounded">2</div><div class="py-1 bg-gray-50 rounded">3</div><div class="py-1 bg-gray-50 rounded">4</div><div class="py-1 bg-gray-50 rounded">5</div><div class="py-1 bg-gray-50 rounded">6</div><div class="py-1 text-gray-200">7</div>
                        <div class="py-1 bg-gray-50 rounded">8</div><div class="py-1 bg-gray-50 rounded">9</div><div class="py-1 bg-gray-50 rounded">10</div><div class="py-1 bg-gray-50 rounded">11</div><div class="py-1 bg-gray-50 rounded">12</div><div class="py-1 bg-gray-50 rounded">13</div><div class="py-1 text-gray-200">14</div>
                        <div class="py-1 bg-gray-50 rounded">15</div><div class="py-1 bg-gray-50 rounded">16</div><div class="py-1 bg-gray-50 rounded">17</div><div class="py-1 bg-gray-50 rounded">18</div><div class="py-1 bg-gray-50 rounded">19</div><div class="py-1 bg-gray-50 rounded">20</div><div class="py-1 text-gray-200">21</div>
                        <div class="py-1 bg-gray-50 rounded border border-sisolTeal text-black cursor-pointer bg-teal-50" id="default-date-btn">22</div><div class="py-1 bg-gray-50 rounded">23</div><div class="py-1 bg-gray-50 rounded">24</div><div class="py-1 bg-gray-50 rounded">25</div><div class="py-1 bg-gray-50 rounded">26</div><div class="py-1 bg-gray-50 rounded">27</div><div class="py-1 text-gray-200">28</div>
                        <div class="py-1 bg-gray-50 rounded">29</div><div class="py-1 bg-gray-50 rounded">30</div><div></div><div></div><div></div><div></div><div></div>
                    </div>
                    <input type="hidden" id="res-fecha" value="2026-06-22">
                </div>

                <!-- Selector de Turnos y Panel de Horas Instantáneo -->
                <div class="flex flex-col">
                    <div class="flex gap-2 justify-center mb-4">
                        <button id="shift-morning" type="button" onclick="setBookingShift('Mañana')" class="flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-sisolYellow text-black transition-all">☀️ Mañana</button>
                        <button id="shift-afternoon" type="button" onclick="setBookingShift('Tarde')" class="flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-white text-gray-600 transition-all">🌙 Tarde</button>
                    </div>
                    <div class="text-center text-gray-700 font-bold mb-2">Horario disponible</div>
                    <input type="hidden" id="selected-hour" value="">
                    <div id="hours-container" class="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto p-1.5 border border-teal-100 rounded-xl bg-gray-50">
                        <!-- Generado por JavaScript sin demoras -->
                    </div>
                </div>
            </div>

            <!-- ASIGNACIÓN DEL MÉDICO -->
            <div class="mb-6">
                <label class="block text-black font-bold mb-1.5 text-lg">Seleccione al médico</label>
                <select id="res-doctor" class="w-full px-4 py-3 border-2 border-sisolTeal rounded-xl font-bold bg-white focus:outline-none">
                    <option value="">-- Seleccionar Médico --</option>
                </select>
            </div>

            <div class="flex justify-center">
                <button type="button" onclick="downloadVoucherPDF()" class="bg-teal-600 hover:bg-teal-700 text-white font-black px-10 py-3 rounded-2xl shadow-lg text-lg flex items-center gap-2 transition-transform active:scale-95">📥 Descargar Voucher PDF</button>
            </div>
        </section>

    </main>

    <script>
        let currentShift = 'Mañana';

        // Base de Datos Estructurada y Completa de Especialistas de Sisol
        const doctorsMap = {
            "Cardiología": ["Dr. Carlos Mendoza Villena", "Dra. Eliana Torres Ramos"],
            "Pediatría": ["Dr. Luis Valdivia Flores", "Dra. Clotilde Silva Paz"],
            "Oftalmología": ["Dr. Mateo Ramos Quispe", "Dra. Juana Díaz Morales"],
            "Medicina General": ["Dr. Andrés Castro Benítez", "Dra. Milagros Vega Luna"],
            "Odontología": ["Dr. Samuel Palacios Chira", "Dra. Rebeca Luna Vizcarra"],
            "Dermatología": ["Dr. Hugo Montenegro Solís", "Dra. Patricia Solano Guerra"],
            "Ginecología": ["Dra. Sofia Alva Centurión", "Dra. Carmen Bustamante Ríos"],
            "Gastroenterología": ["Dr. Javier Quiroz Neyra", "Dra. Elena Medina Ugarte"],
            "Traumatología": ["Dr. Francisco Wong Loayza", "Dr. Nelson Vargas Machuca"],
            "Neurología": ["Dr. Tomás Toledo Espinoza", "Dra. Olga Miranda Carpio"],
            "Otorrinolaringología": ["Dr. Raúl Cáceres Prado", "Dra. Inés Pardo Dávila"],
            "Urología": ["Dr. Christian Ugarte Solórzano", "Dr. Mario Benavides Soto"],
            "Endocrinología": ["Dra. Silvia Peralta Zegarra", "Dr. Gonzalo Rivas Cordero"],
            "Psiquiatría": ["Dr. Humberto Costa Belaúnde", "Dra. Diana Leyva Farfán"],
            "Nutrición": ["Lic. Maritza Beltrán Casas", "Lic. Kevin Cárdenas Soto"],
            "Reumatología": ["Dr. Arturo Zevallos Pastor", "Dra. Elena Fuentes Rivera"],
            "Neumología": ["Dr. Alberto Salvatierra Delgado", "Dra. Rossana Alfaro Gil"],
            "Nefrología": ["Dr. Enrique Alarcón Vinatea", "Dra. Pilar Montoya Alba"],
            "Psicología": ["Psic. Clara Gutiérrez Sanz", "Psic. Jorge Linares Flores"],
            "Geriatría": ["Dr. José Gabriel Meléndez", "Dra. Alicia Ruiz Tello"],
            "Medicina Física": ["Dr. Walter Carranza Vigo", "Lic. Estela Prado Macías"],
            "Oncología": ["Dr. Alejandro Valenzuela Rosas", "Dra. Carmen Palomino Caro"],
            "Cirugía General": ["Dr. Ricardo Tello Arriola", "Dr. Fernando Vizcardo Mendoza"]
        };

        function onSpecialtyChange() {
            const specialty = document.getElementById('res-specialty').value;
            const docSelect = document.getElementById('res-doctor');
            docSelect.innerHTML = '<option value="">-- Seleccionar Médico --</option>';
            
            const docs = doctorsMap[specialty] || ["Dr. Médico de Turno General"];
            docs.forEach(doc => {
                let opt = document.createElement('option');
                opt.value = doc;
                opt.textContent = doc;
                docSelect.appendChild(opt);
            });
        }

        function setBookingShift(shift) {
            currentShift = shift;
            const btnM = document.getElementById('shift-morning');
            const btnA = document.getElementById('shift-afternoon');
            
            if(shift === 'Mañana') {
                btnM.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-sisolYellow text-black transition-all";
                btnA.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-white text-gray-600 transition-all";
            } else {
                btnM.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-white text-gray-600 transition-all";
                btnA.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-2 font-bold bg-sisolYellow text-black transition-all";
            }
            generateHours();
        }

        function generateHours() {
            const container = document.getElementById('hours-container');
            container.innerHTML = '';
            
            let hours = currentShift === 'Mañana' 
                ? ["07:00 AM - 07:30 AM", "07:35 AM - 08:05 AM", "08:10 AM - 08:40 AM", "08:45 AM - 09:15 AM", "09:20 AM - 09:50 AM", "09:55 AM - 10:25 AM"]
                : ["02:00 PM - 02:30 PM", "02:35 PM - 03:05 PM", "03:10 PM - 03:40 PM", "03:45 PM - 04:15 PM", "04:20 PM - 04:50 PM", "04:55 PM - 05:25 PM"];
                
            hours.forEach(h => {
                let btn = document.createElement('button');
                btn.type = "button";
                btn.className = "hour-btn bg-white border-2 border-sisolDarkBlue text-black font-bold py-2.5 px-2 rounded-xl text-center text-sm transition-all duration-75 active:scale-95 shadow-sm";
                btn.textContent = h;
                
                // Respuesta de color inmediata al hacer click
                btn.onclick = function() {
                    document.querySelectorAll('.hour-btn').forEach(b => {
                        b.classList.remove('bg-sisolYellow');
                        b.classList.add('bg-white');
                    });
                    btn.classList.remove('bg-white');
                    btn.classList.add('bg-sisolYellow');
                    document.getElementById('selected-hour').value = h;
                };
                container.appendChild(btn);
            });
        }

        function downloadVoucherPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            const specialtyEl = document.getElementById('res-specialty');
            const selectedOpt = specialtyEl.options[specialtyEl.selectedIndex];
            
            const specialty = specialtyEl.value || "General";
            const medico = document.getElementById('res-doctor').value || "Médico de Turno General";
            let fecha = "22/06/2026"; 
            const hora = document.getElementById('selected-hour').value || "07:00 AM";
            
            const piso = selectedOpt ? (selectedOpt.getAttribute('data-piso') || 'Piso 1') : 'Piso 1';
            const consultorio = selectedOpt ? (selectedOpt.getAttribute('data-consultorio') || 'Cons. 101') : 'Cons. 101';
            const monto = selectedOpt ? (selectedOpt.getAttribute('data-costo') || '20') : '20';
            const boletaCod = Math.floor(100000 + Math.random() * 900000);

            // Banner superior estructurado
            doc.setFillColor(9, 60, 93);
            doc.rect(0, 0, 210, 40, 'F');
            
            // Logotipo Isotipo de la corporación
            doc.setFillColor(241, 168, 52);
            doc.circle(25, 20, 10, 'F');
            doc.setFillColor(255, 255, 255);
            doc.rect(23, 13, 4, 14, 'F');
            doc.rect(18, 18, 14, 4, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("SISOL SALUD", 42, 22);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("Municipalidad Metropolitana de Lima", 42, 28);

            // Código de Factura Electrónica
            doc.setFillColor(29, 161, 162);
            doc.roundRect(140, 8, 60, 24, 3, 3, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.text("BOLETA DE CITA", 147, 16);
            doc.text(`N° B001-${boletaCod}`, 147, 24);

            // Bloque de Datos Emisor
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(11);
            let y = 55;
            doc.setFont("helvetica", "bold");
            doc.text("ESTABLECIMIENTO Y EMISIÓN", 15, y);
            doc.line(15, y + 2, 195, y + 2);
            y += 10;

            doc.setFont("helvetica", "normal");
            doc.text("Sede / Local:", 15, y); doc.setFont("helvetica", "bold"); doc.text("Hospital de la Solidaridad - Sede Ate", 55, y); doc.setFont("helvetica", "normal"); y += 7;
            doc.text("RUC:", 15, y); doc.text("20504360221", 55, y); y += 7;
            doc.text("Fecha Emisión:", 15, y); doc.text(`${fecha} ${new Date().toLocaleTimeString()}`, 55, y); y += 15;

            // Datos Clínicos
            doc.setFont("helvetica", "bold");
            doc.text("DETALLES DE LA ATENCIÓN MÉDICA", 15, y);
            doc.line(15, y + 2, 195, y + 2);
            y += 10;

            doc.setFont("helvetica", "normal");
            doc.text("Especialidad:", 15, y); doc.setFont("helvetica", "bold"); doc.text(`${specialty}`, 55, y); doc.setFont("helvetica", "normal"); y += 8;
            doc.text("Médico Asignado:", 15, y); doc.text(`${medico}`, 55, y); y += 8;
            doc.text("Fecha de Cita:", 15, y); doc.text(`${fecha}`, 55, y); y += 8;
            doc.text("Bloque Horario:", 15, y); doc.text(`${hora}`, 55, y); y += 8;
            doc.text("Ubicación Interna:", 15, y); doc.setFont("helvetica", "bold"); doc.text(`${piso} - ${consultorio}`, 55, y); doc.setFont("helvetica", "normal"); y += 15;

            // Bloque de Montos
            doc.setFillColor(245, 245, 245);
            doc.rect(15, y, 180, 15, 'F');
            doc.setFont("helvetica", "bold");
            doc.text("Concepto", 20, y + 10);
            doc.text("Total Cancelado", 150, y + 10);
            
            y += 15;
            doc.setFont("helvetica", "normal");
            doc.text(`Pago por Derecho de Consulta Médica`, 20, y + 10);
            doc.setFont("helvetica", "bold");
            doc.text(`S/. ${monto}.00 PEN`, 150, y + 10);
            doc.line(15, y + 16, 195, y + 16);

            y += 35;
            doc.setFillColor(9, 60, 93);
            doc.rect(15, y, 180, 10, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(9);
            doc.text("IMPORTANTE: Presentarse en el módulo de admisión 15 minutos antes de su cita.", 22, y + 6.5);

            doc.save(`Boleta_Cita_SISOL_${boletaCod}.pdf`);
        }

        window.onload = function() {
            generateHours();
        };
    </script>
</body>
</html>
