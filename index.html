<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisol Salud - Portal de Citas Médicas Ate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sisolTeal: '#1da1a2',
                        sisolDarkBlue: '#093c5d',
                        sisolYellow: '#f1a834',
                        sisolYellowHover: '#d99120',
                        sisolOrange: '#ef3e36',
                        sisolGrayInput: '#dcdcdc'
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --url-fondo-login: url('https://unicla.edu.mx/wp-content/uploads/2025/04/Portada_Blog_2025_08_Abril.webp');
            --url-logo-sisol: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTf4_-oceL42nUuVmnsS4-helAB8kAAlmCnMelG_aWEt8huf_nL3jDf6hU&s=10');
            --url-doctor-image: url('https://media.baamboozle.com/uploads/images/1343228/a1df8c16-9cd7-4911-9bf8-bae793276f02.gif');
        }
        .bg-login-custom {
            background-image: var(--url-fondo-login);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2acaca; border-radius: 10px; }
    </style>
</head>
<body class="bg-login-custom min-h-screen flex flex-col font-sans transition-all duration-300">

    <header class="bg-white px-6 py-3 flex justify-between items-center shadow-md z-50">
        <div onclick="safeLogout()" class="cursor-pointer hover:opacity-90 transition-all">
            <img id="banner-muni" src="https://static.wikia.nocookie.net/logopedia/images/d/d5/Munilima23.png" alt="Municipalidad de Lima" class="h-12 md:h-14 object-contain">
        </div>
        <div onclick="safeLogout()" class="cursor-pointer hover:opacity-90 transition-all">
            <img id="banner-sisol" src="https://convocatorias.sisol.gob.pe/wp-content/uploads/2022/03/Hospitales-de-la-solidaridad-.png" alt="Hospitales de la Solidaridad" class="h-12 md:h-14 object-contain">
        </div>
    </header>

    <main class="flex-1 flex justify-center items-center p-4 md:p-8">
        
        <section id="view-reserva" class="w-full max-w-4xl bg-white rounded-3xl p-6 md:p-8 shadow-2xl border-4 border-sisolDarkBlue">
            <div class="flex justify-between items-center border-b-2 border-sisolTeal pb-3 mb-6">
                <h2 id="booking-title" class="text-sisolYellow font-extrabold text-3xl">Reservar cita</h2>
                <button onclick="alert('Regresar')" class="bg-sisolYellow hover:bg-sisolYellowHover text-black font-extrabold px-6 py-2 rounded-xl transition-all">Regresar</button>
            </div>

            <div class="mb-5">
                <label class="block text-black font-bold mb-1.5 text-lg">Seleccione la especialidad</label>
                <select id="res-specialty" onchange="onSpecialtyChange()" class="w-full px-4 py-3 border-2 border-sisolTeal rounded-xl font-bold bg-white focus:outline-none">
                    <option value="">-- Elija la especialidad médica --</option>
                    <option value="Cardiología" data-piso="Piso 2" data-consultorio="Cons. 204" data-costo="29">Cardiología - S/. 29.00</option>
                    <option value="Pediatría" data-piso="Piso 1" data-consultorio="Cons. 102" data-costo="29">Pediatría - S/. 29.00</option>
                    <option value="Oftalmología" data-piso="Piso 3" data-consultorio="Cons. 301" data-costo="29">Oftalmología - S/. 29.00</option>
                    <option value="Medicina General" data-piso="Piso 2" data-consultorio="Cons. 210" data-costo="21">Medicina General - S/. 21.00</option>
                    <option value="Odontología" data-piso="Piso 1" data-consultorio="Cons. 105" data-costo="10">Odontología - S/. 10.00</option>
                    <option value="Dermatología" data-piso="Piso 3" data-consultorio="Cons. 305" data-costo="25">Dermatología - S/. 25.00</option>
                    <option value="Ginecología" data-piso="Piso 2" data-consultorio="Cons. 208" data-costo="26">Ginecología - S/. 26.00</option>
                    <option value="Gastroenterología" data-piso="Piso 1" data-consultorio="Cons. 112" data-costo="30">Gastroenterología - S/. 30.00</option>
                    <option value="Traumatología" data-piso="Piso 3" data-consultorio="Cons. 315" data-costo="32">Traumatología - S/. 32.00</option>
                    <option value="Neurología" data-piso="Piso 2" data-consultorio="Cons. 222" data-costo="35">Neurología - S/. 35.00</option>
                    <option value="Otorrinolaringología" data-piso="Piso 1" data-consultorio="Cons. 108" data-costo="28">Otorrinolaringología - S/. 28.00</option>
                    <option value="Urología" data-piso="Piso 3" data-consultorio="Cons. 310" data-costo="30">Urología - S/. 30.00</option>
                    <option value="Endocrinología" data-piso="Piso 2" data-consultorio="Cons. 201" data-costo="32">Endocrinología - S/. 32.00</option>
                    <option value="Psiquiatría" data-piso="Piso 3" data-consultorio="Cons. 340" data-costo="25">Psiquiatría - S/. 25.00</option>
                    <option value="Nutrición" data-piso="Piso 1" data-consultorio="Cons. 106" data-costo="15">Nutrición - S/. 15.00</option>
                </select>
            </div>

            <label class="block text-black font-bold mb-2 text-lg">Seleccione la fecha y hora</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-5">
                <div class="border border-teal-200 rounded-2xl p-4 bg-white shadow-sm flex flex-col gap-2">
                    <label class="font-bold text-gray-700">Fecha de Consulta:</label>
                    <input type="date" id="res-fecha" onchange="generateHours()" class="w-full px-4 py-2 border-2 border-sisolTeal rounded-xl font-bold focus:outline-none">
                </div>

                <div class="flex flex-col">
                    <div class="flex gap-2 justify-center mb-4">
                        <button id="shift-morning" onclick="setBookingShift('Mañana')" class="flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-sisolYellow text-black">☀️ Mañana</button>
                        <button id="shift-afternoon" onclick="setBookingShift('Tarde')" class="flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-white text-gray-600">🌙 Tarde</button>
                    </div>
                    <div class="text-center text-gray-700 font-bold mb-2">Horario disponible</div>
                    <input type="hidden" id="selected-hour" value="">
                    <div id="hours-container" class="grid grid-cols-2 gap-2 max-h-[160px] overflow-y-auto p-1.5 border border-teal-100 rounded-xl bg-gray-50">
                        </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-black font-bold mb-1.5 text-lg">Seleccione al médico</label>
                <select id="res-doctor" class="w-full px-4 py-3 border-2 border-sisolTeal rounded-xl font-bold bg-white focus:outline-none">
                    <option value="">-- Seleccionar Médico --</option>
                </select>
            </div>

            <div class="flex justify-center gap-4">
                <button onclick="downloadVoucherPDF()" class="bg-teal-600 hover:bg-teal-700 text-white font-black px-10 py-3 rounded-2xl shadow-lg text-lg transition-all flex items-center gap-2">📥 Descargar Voucher PDF</button>
            </div>
        </section>

    </main>

    <script>
        let currentShift = 'Mañana';

        const doctorsMap = {
            "Cardiología": ["Dr. Carlos Mendoza", "Dra. Eliana Torres"],
            "Pediatría": ["Dr. Luis Valdivia", "Dra. Clotilde Silva"],
            "Oftalmología": ["Dr. Mateo Ramos", "Dra. Juana Díaz"],
            "Medicina General": ["Dr. Andrés Castro", "Dra. Milagros Vega"],
            "Odontología": ["Dr. Samuel Palacios", "Dra. Rebeca Luna"],
            "Dermatología": ["Dr. Hugo Montenegro", "Dra. Patricia Solano"],
            "Ginecología": ["Dra. Sofia Alva", "Dra. Carmen Bustamante"]
        };

        function onSpecialtyChange() {
            const specialty = document.getElementById('res-specialty').value;
            const docSelect = document.getElementById('res-doctor');
            docSelect.innerHTML = '<option value="">-- Seleccionar Médico --</option>';
            
            const docs = doctorsMap[specialty] || ["Dr. Médico de Turno General", "Dra. Especialista Asignada"];
            docs.forEach(doc => {
                let opt = document.createElement('option');
                opt.value = doc;
                opt.textContent = doc;
                docSelect.appendChild(opt);
            });
            generateHours();
        }

        function setBookingShift(shift) {
            currentShift = shift;
            const btnM = document.getElementById('shift-morning');
            const btnA = document.getElementById('shift-afternoon');
            
            if(shift === 'Mañana') {
                btnM.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-sisolYellow text-black";
                btnA.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-white text-gray-600";
            } else {
                btnM.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-white text-gray-600";
                btnA.className = "flex-1 border-2 border-sisolDarkBlue rounded-full py-1.5 font-bold transition-all bg-sisolYellow text-black";
            }
            generateHours();
        }

        function generateHours() {
            const container = document.getElementById('hours-container');
            container.innerHTML = '';
            
            let hours = currentShift === 'Mañana' 
                ? ["08:00 AM", "08:35 AM", "09:10 AM", "09:45 AM", "10:20 AM", "10:55 AM", "11:30 AM"]
                : ["02:00 PM", "02:35 PM", "03:10 PM", "03:45 PM", "04:20 PM", "04:55 PM", "05:30 PM"];
                
            hours.forEach(h => {
                let btn = document.createElement('button');
                btn.type = "button";
                btn.className = "hour-btn bg-white border border-gray-300 text-gray-800 font-bold py-2 px-1 rounded-xl hover:bg-sisolTeal hover:text-white transition-all text-sm";
                btn.textContent = h;
                btn.onclick = function() {
                    document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('bg-sisolDarkBlue', 'text-white'));
                    btn.classList.add('bg-sisolDarkBlue', 'text-white');
                    document.getElementById('selected-hour').value = h;
                };
                container.appendChild(btn);
            });
        }

        // FUNCIÓN CLAVE: CORRECCIÓN Y DESCARGA DEL VOUCHER EN PDF REAL
        function downloadVoucherPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const specialtyEl = document.getElementById('res-specialty');
            const selectedOpt = specialtyEl.options[specialtyEl.selectedIndex];
            
            const specialty = specialtyEl.value || "No seleccionada";
            const medico = document.getElementById('res-doctor').value || "Por asignar";
            const fecha = document.getElementById('res-fecha').value || new Date().toLocaleDateString('es-PE');
            const hora = document.getElementById('selected-hour').value || "No seleccionada";
            
            const piso = selectedOpt ? (selectedOpt.getAttribute('data-piso') || 'Piso 1') : 'Piso 1';
            const consultorio = selectedOpt ? (selectedOpt.getAttribute('data-consultorio') || 'Cons. 101') : 'Cons. 101';
            const monto = selectedOpt ? (selectedOpt.getAttribute('data-costo') || '20') : '20';
            const boletaCod = Math.floor(100000 + Math.random() * 900000);

            // Estilos estéticos del PDF
            doc.setFillColor(9, 60, 93); // sisolDarkBlue
            doc.rect(0, 0, 210, 30, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("SISOL SALUD - COMPROBANTE DE CITA MEDICA", 15, 20);

            doc.setTextColor(0, 0, 0);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            
            let y = 45;
            doc.text(`Establecimiento: Hospital de la Solidaridad - Sede Ate Vitarte`, 15, y); y+=10;
            doc.text(`Codigo de Boleta: SISOL-${boletaCod}`, 15, y); y+=10;
            doc.text(`Fecha Emision: ${new Date().toLocaleDateString('es-PE')}`, 15, y); y+=15;
            
            doc.setFont("helvetica", "bold");
            doc.text("DETALLE DE LA CITA:", 15, y); y+=10;
            doc.setFont("helvetica", "normal");
            
            doc.text(`Especialidad: ${specialty}`, 15, y); y+=10;
            doc.text(`Medico: ${medico}`, 15, y); y+=10;
            doc.text(`Fecha Programada: ${fecha}`, 15, y); y+=10;
            doc.text(`Hora Programada: ${hora}`, 15, y); y+=10;
            doc.text(`Ubicacion: Sede Ate Vitarte - ${piso} - ${consultorio}`, 15, y); y+=15;
            
            doc.setFont("helvetica", "bold");
            doc.text(`Monto Abonado: S/. ${monto}.00 PEN`, 15, y); y+=10;
            doc.text(`Estado del Pago: APROBADO`, 15, y); y+=15;
            
            doc.setFont("helvetica", "italic");
            doc.setFontSize(10);
            doc.text("Nota: Por favor asista 10 minutos antes de su horario.", 15, y);

            doc.save(`Voucher-SISOL-${boletaCod}.pdf`);
        }

        // Inicializar horas al cargar
        window.onload = function() {
            generateHours();
        };
        function safeLogout() { alert("Sesión finalizada de manera segura."); }
    </script>
</body>
</html>
