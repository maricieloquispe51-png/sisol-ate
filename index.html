<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISOL SALUD - Sede Ate (Reserva de Citas)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🔵 SISOL SALUD - ATE</h1>
            <span class="bg-blue-800 px-3 py-1 text-xs rounded-full font-semibold">Portal del Paciente (V2)</span>
        </div>
    </header>

    <main class="container mx-auto my-8 max-w-xl px-4">
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Reserva tu Cita Médica</h2>
            <p class="text-sm text-gray-600 mb-6">Evita las colas en el establecimiento programando y pagando tu consulta de forma 100% digital.</p>

            <form id="formCita" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">DNI del Paciente</label>
                    <input type="text" id="dni" maxlength="8" required class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Ingresa 8 dígitos">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Nombres y Apellidos</label>
                    <input type="text" id="nombre" required class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="Ej. Juan Pérez">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Especialidad Médica</label>
                    <select id="especialidad" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="Medicina General" data-precio="20.00">Medicina General - S/ 20.00</option>
                        <option value="Pediatría" data-precio="25.00">Pediatría - S/ 25.00</option>
                        <option value="Ginecología" data-precio="30.00">Ginecología - S/ 30.00</option>
                        <option value="Odontología" data-precio="22.00">Odontología - S/ 22.00</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Fecha</label>
                        <input type="date" id="fecha" required class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Horario disponible</label>
                        <select id="hora" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                            <option value="08:00">08:00 AM</option>
                            <option value="09:30">09:30 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="15:00">03:00 PM</option>
                        </select>
                    </div>
                </div>

                <hr class="my-6 border-gray-200">

                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h3 class="font-bold text-blue-900 mb-2 text-sm">💳 Pasarela de Pago Seguro (Simulada)</h3>
                    <div class="space-y-3">
                        <input type="text" placeholder="Número de Tarjeta (4242 4242...)" required class="w-full p-2 bg-white text-sm border border-gray-300 rounded-md">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" placeholder="MM/AA" required class="w-full p-2 bg-white text-sm border border-gray-300 rounded-md">
                            <input type="text" placeholder="CVV" required class="w-full p-2 bg-white text-sm border border-gray-300 rounded-md">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md transition duration-200 shadow shadow-green-700">
                    Confirmar Pago y Reservar Cita
                </button>
            </form>
        </div>
    </main>

    <div id="qrcode" class="hidden"></div>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS EN LA NUBE (SUPABASE)
        const SUPABASE_URL = "TU_URL_DE_SUPABASE_AQUÍ";
        const SUPABASE_KEY = "TU_API_KEY_DE_SUPABASE_AQUÍ";

        document.getElementById('formCita').addEventListener('submit', async function(e) {
            e.preventDefault();

            const dni = document.getElementById('dni').value;
            const nombre = document.getElementById('nombre').value;
            const selectEsp = document.getElementById('especialidad');
            const especialidad = selectEsp.value;
            const monto = parseFloat(selectEsp.options[selectEsp.selectedIndex].getAttribute('data-precio'));
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const boleta = "B" + Math.floor(100 + Math.random() * 900) + "-" + Math.floor(10000 + Math.random() * 90000);

            // 1. Guardar Datos de forma real en la base de datos Supabase
            const datosCita = {
                dni: dni,
                nombre_paciente: nombre,
                especialidad: especialidad,
                fecha_cita: fecha,
                hora_cita: hora,
                monto_pagado: monto,
                codigo_boleta: boleta
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/citas_sisol`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify(datosCita)
                });

                if(response.ok) {
                    alert("¡Pago aprobado por la pasarela! Guardando cita en la Base de Datos.");
                    // 2. Generar el Voucher Profesional en PDF
                    generarVoucherPDF(dni, nombre, especialidad, fecha, hora, monto, boleta);
                } else {
                    alert("Error al conectar con la base de datos de Supabase. Revisa tus llaves.");
                }
            } catch (error) {
                // Si aún no configuras Supabase, igual generará el PDF para que pruebes cómo funciona
                alert("Modo Demostración Local activo. Generando comprobante...");
                generarVoucherPDF(dni, nombre, especialidad, fecha, hora, monto, boleta);
            }
        });

        function generarVoucherPDF(dni, nombre, especialidad, fecha, hora, monto, boleta) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Cabecera institucional
            doc.setFillColor(26, 86, 219);
            doc.rect(0, 0, 210, 25, "F");
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.setTextColor(255, 255, 255);
            doc.text("SISOL SALUD ATE - COMPROBANTE DE CITA", 14, 16);

            // Metadata del voucher
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Boleta de Venta Electrónica: ${boleta}`, 14, 35);
            doc.text(`Fecha de Emisión: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}`, 14, 41);
            doc.line(14, 45, 196, 45);

            // Información del Paciente
            doc.setFont("helvetica", "bold");
            doc.text("INFORMACIÓN DEL PACIENTE", 14, 53);
            doc.setFont("helvetica", "normal");
            doc.text(`Paciente: ${nombre}`, 14, 60);
            doc.text(`Documento de Identidad: DNI ${dni}`, 14, 66);

            // Detalles del Servicio
            doc.setFont("helvetica", "bold");
            doc.text("DETALLES DE LA ATENCIÓN PROGRAMADA", 14, 76);
            doc.setFont("helvetica", "normal");
            doc.text(`Especialidad: ${especialidad}`, 14, 83);
            doc.text(`Fecha de la Cita: ${fecha}`, 14, 89);
            doc.text(`Hora Asignada: ${hora} AM/PM`, 14, 95);
            doc.text(`Sede Operativa: Carretera Central - Ate Vitarte`, 14, 101);

            // Cálculos Contables (Para impresionar al docente)
            doc.line(14, 107, 196, 107);
            let subtotal = (monto / 1.18).toFixed(2);
            let igv = (monto - subtotal).toFixed(2);
            doc.text(`Subtotal Neto: S/ ${subtotal}`, 14, 115);
            doc.text(`I.G.V. (18.00%): S/ ${igv}`, 14, 121);
            doc.setFont("helvetica", "bold");
            doc.text(`TOTAL PAGADO: S/ ${monto.toFixed(2)}`, 14, 128);

            // Generación de Código QR de seguridad
            document.getElementById("qrcode").innerHTML = ""; // Limpiar qr viejo
            const qrText = `SISOL-ATE|BOLETA:${boleta}|DNI:${dni}|ESP:${especialidad}|MTO:${monto}`;
            new QRCode(document.getElementById("qrcode"), {
                text: qrText,
                width: 100,
                height: 100
            });

            // Darle un segundo al navegador para renderizar el QR e inyectarlo en el PDF
            setTimeout(() => {
                const qrCanvas = document.querySelector("#qrcode canvas");
                if (qrCanvas) {
                    const qrImgData = qrCanvas.toDataURL("image/png");
                    doc.addImage(qrImgData, "PNG", 14, 140, 35, 35);
                }
                doc.setFontSize(8);
                doc.setFont("helvetica", "italic");
                doc.text("Módulo de Validación Digital. Muestre este código QR en los tótems de admisión.", 55, 155);
                doc.text("Al llegar, pase directamente a la sala de espera del consultorio correspondiente.", 55, 160);
                
                // Forzar descarga del archivo
                doc.save(`Voucher_SISOL_Ate_${boleta}.pdf`);
            }, 500);
        }
    </script>
</body>
</html>
